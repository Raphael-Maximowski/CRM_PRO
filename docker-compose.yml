services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crm_pro_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/backend/docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crm_pro_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile.dev
    container_name: crm_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-crm_pro_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./packages/backend:/app
      - /app/node_modules

  web:
    build:
      context: ./platform/web
      dockerfile: Dockerfile.dev
    container_name: crm_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - "3001:3000"
    volumes:
      - ./platform/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
